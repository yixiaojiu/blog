<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Message 系统架构流程</title>
  <desc id="desc">展示外部平台消息通过 Satori 统一网关进入系统，经过消息标准化、群聊或私聊处理、会话上下文管理、LLM 回复决策后，再通过 adapter 发回平台，同时将对话窗口沉淀为长期记忆。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .gateway { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.5; }
      .context { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 1.5; }
      .llm { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.5; }
      .memory { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; }
      .title { fill: #111827; font: 700 22px sans-serif; }
      .text { fill: #1f2937; font: 600 16px sans-serif; }
      .small { fill: #475569; font: 14px sans-serif; }
      .line { stroke: #4b5563; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .softline { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1040" height="620" rx="20" />
  <text class="title" x="40" y="52">Message 系统流程</text>
  <text class="small" x="40" y="82">外部平台通过 Satori 统一接入，业务层只处理标准化后的消息和会话上下文。</text>

  <rect class="box" x="54" y="130" width="174" height="100" rx="12" />
  <text class="text" x="141" y="164" text-anchor="middle">外部平台</text>
  <text class="small" x="141" y="192" text-anchor="middle">OneBot / Lark</text>
  <text class="small" x="141" y="214" text-anchor="middle">后续平台</text>

  <path class="line" d="M 228 180 H 286" />

  <rect class="gateway" x="286" y="130" width="184" height="100" rx="12" />
  <text class="text" x="378" y="164" text-anchor="middle">Satori 消息网关</text>
  <text class="small" x="378" y="192" text-anchor="middle">Adapter 统一平台事件</text>

  <path class="line" d="M 470 180 H 528" />

  <rect class="box" x="528" y="130" width="184" height="100" rx="12" />
  <text class="text" x="620" y="164" text-anchor="middle">消息标准化</text>
  <text class="small" x="620" y="192" text-anchor="middle">Session -> 统一消息结构</text>

  <path class="line" d="M 712 180 H 770" />

  <rect class="box" x="770" y="130" width="184" height="100" rx="12" />
  <text class="text" x="862" y="164" text-anchor="middle">消息处理入口</text>
  <text class="small" x="862" y="192" text-anchor="middle">群聊 / 私聊 Handler</text>

  <path class="line" d="M 862 230 V 282" />

  <rect class="context" x="684" y="282" width="356" height="132" rx="14" />
  <text class="text" x="862" y="316" text-anchor="middle">会话上下文管理</text>
  <text class="small" x="862" y="346" text-anchor="middle">最近原始消息</text>
  <text class="small" x="862" y="370" text-anchor="middle">滚动摘要</text>
  <text class="small" x="862" y="394" text-anchor="middle">Episode 窗口</text>

  <path class="line" d="M 684 348 H 612" />

  <rect class="llm" x="424" y="282" width="188" height="132" rx="14" />
  <text class="text" x="518" y="316" text-anchor="middle">LLM 回复决策</text>
  <text class="small" x="518" y="346" text-anchor="middle">是否回复</text>
  <text class="small" x="518" y="370" text-anchor="middle">回复内容</text>
  <text class="small" x="518" y="394" text-anchor="middle">心情变化</text>

  <path class="line" d="M 424 348 H 320" />

  <rect class="gateway" x="136" y="282" width="184" height="132" rx="14" />
  <text class="text" x="228" y="316" text-anchor="middle">发回平台</text>
  <text class="small" x="228" y="346" text-anchor="middle">通过 Satori Adapter</text>
  <text class="small" x="228" y="370" text-anchor="middle">发送文字 / 表情</text>

  <path class="softline" d="M 228 414 C 228 494 650 494 772 414" />
  <text class="small" x="505" y="502" text-anchor="middle">机器人回复也写回会话上下文</text>

  <path class="softline" d="M 862 414 V 476" />

  <rect class="memory" x="684" y="476" width="356" height="100" rx="14" />
  <text class="text" x="862" y="510" text-anchor="middle">长期沉淀</text>
  <text class="small" x="862" y="538" text-anchor="middle">Memory Episode / 人物记忆</text>
</svg>
